<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedir Entrega — MotoJet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏍️</text></svg>">
  <style>
    body { background: var(--dark); }
    .app-content { padding: 24px 20px; max-width: 540px; margin: 0 auto; }
    .step-content { animation: fadeSlide 0.35s ease forwards; }
  </style>
</head>
<body class="app-page">

<div class="notification-stack" id="notif-stack"></div>

<!-- App Nav -->
<nav class="app-nav">
  <a href="index.html" style="color:var(--gray);font-size:20px;text-decoration:none;line-height:1">←</a>
  <a href="index.html" class="logo" style="flex:1;text-align:center">MOTO<span>JET</span><sup>MZ</sup></a>
  <a href="https://wa.me/258840000000" target="_blank" style="color:#25D366;font-size:22px;text-decoration:none">💬</a>
</nav>

<!-- App Content -->
<div class="app-content">
  <!-- Progress -->
  <div style="margin-bottom:8px">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span id="step-label" style="font-size:12px;color:var(--gray)">Passo 1/3 — Seus dados</span>
      <span style="font-size:12px;color:var(--gray)">🏍️ MotoJet</span>
    </div>
  </div>

  <!-- Step container -->
  <div id="step-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/main.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>
</body>
</html>
